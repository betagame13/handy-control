<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handy Control</title>
  <style>
    :root {
      --bg: #0a0a0f; --surface: #13131f; --surface2: #1a1a2e; --border: #252540;
      --purple: #7c4dff; --purple2: #e040fb; --green: #4caf50; --orange: #ffb74d;
      --red: #f44336; --blue: #64b5f6; --text: #e8e8f0; --muted: #666;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: "Segoe UI", system-ui, sans-serif; min-height: 100vh; }

    /* LOGIN */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, rgba(124,77,255,0.15) 0%, transparent 70%);
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px 36px; width: 360px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5); text-align: center;
    }
    .login-logo { font-size: 48px; margin-bottom: 12px; }
    .login-title {
      font-size: 22px; font-weight: 800; margin-bottom: 4px;
      background: linear-gradient(135deg, #e040fb, #7c4dff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .login-input {
      width: 100%; padding: 14px 16px; margin-bottom: 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 16px;
      outline: none; transition: border-color 0.2s; letter-spacing: 3px; text-align: center;
          }
    .login-input::placeholder { letter-spacing: 1px; text-transform: none; font-size: 13px; }
    .login-input:focus { border-color: var(--purple); }
    .login-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--purple), var(--purple2));
      border: none; border-radius: 10px; color: #fff;
      font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.88; }
    .login-err { font-size: 12px; color: var(--red); min-height: 18px; margin-top: 8px; }

    /* NAVBAR */
    .navbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .navbar-logo {
      font-size: 15px; font-weight: 800;
      background: linear-gradient(135deg, #e040fb, #7c4dff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .navbar-right { display: flex; align-items: center; gap: 12px; }
    .navbar-user { font-size: 12px; color: var(--muted); }
    .timer-badge {
      font-size: 13px; font-weight: 700; color: var(--orange);
      background: rgba(255,183,77,0.1); border: 1px solid rgba(255,183,77,0.3);
      padding: 5px 12px; border-radius: 20px; font-variant-numeric: tabular-nums;
      transition: all 0.3s;
    }
    .timer-badge.urgent { color: var(--red); background: rgba(244,67,54,0.1); border-color: rgba(244,67,54,0.3); animation: blink 1s infinite; }
    .timer-badge.stopped { color: var(--muted); background: transparent; border-color: var(--border); }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.4} }
    .btn-logout {
      padding: 6px 14px; background: transparent;
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    .main { padding: 24px; max-width: 860px; margin: 0 auto; }

    /* STATUS */
    .status-bar {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px; margin-bottom: 20px;
    }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); transition: all 0.3s; }
    .status-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.offline { background: var(--red); }
    .status-text { font-size: 13px; font-weight: 600; flex: 1; }
    .status-mode {
      font-size: 11px; padding: 3px 10px; border-radius: 20px;
      background: rgba(124,77,255,0.15); color: var(--purple); border: 1px solid rgba(124,77,255,0.3);
    }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media(max-width:600px){ .grid { grid-template-columns: 1fr; } }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
    .card-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; }

    /* VELOCIDADE */
    .vel-display { text-align: center; margin-bottom: 16px; }
    .vel-number {
      font-size: 56px; font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, #7c4dff, #e040fb);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .vel-unit { font-size: 14px; color: var(--muted); margin-top: 2px; }
    .vel-slider {
      width: 100%; height: 6px; border-radius: 3px;
      -webkit-appearance: none; appearance: none;
      background: linear-gradient(to right, var(--purple) 0%, var(--purple2) var(--val,50%), var(--border) var(--val,50%));
      outline: none; cursor: pointer; margin-bottom: 12px;
    }
    .vel-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
      background: #fff; box-shadow: 0 2px 8px rgba(124,77,255,0.6); cursor: pointer;
    }
    .vel-presets { display: flex; gap: 6px; }
    .btn-preset {
      flex: 1; padding: 7px 0; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-preset:hover, .btn-preset.active { background: var(--purple); border-color: var(--purple); color: #fff; }

    /* CONTROLES */
    .ctrl-btns { display: flex; gap: 10px; margin-bottom: 14px; }
    .btn-start {
      flex: 1; padding: 14px;
      background: linear-gradient(135deg, #2e7d32, #43a047);
      border: none; border-radius: 10px; color: #fff;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-start:hover { opacity: 0.88; }
    .btn-stop {
      flex: 1; padding: 14px;
      background: linear-gradient(135deg, #b71c1c, #f44336);
      border: none; border-radius: 10px; color: #fff;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-stop:hover { opacity: 0.88; }
    .btn-ansioso {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #ff6b35, #ff1744);
      border: none; border-radius: 10px; color: #fff;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-ansioso:hover { opacity: 0.88; }
    .btn-ansioso.ativo { animation: pulse-red 1.5s infinite; }
    @keyframes pulse-red { 0%,100%{box-shadow:0 0 0 0 rgba(255,23,68,0.5)}50%{box-shadow:0 0 0 10px rgba(255,23,68,0)} }

    /* PADROES */
    .patterns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn-pattern {
      padding: 12px 8px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .btn-pattern:hover { border-color: var(--purple); background: rgba(124,77,255,0.1); }
    .btn-pattern.active { border-color: var(--purple); background: rgba(124,77,255,0.15); color: var(--purple); }
    .pat-icon { font-size: 20px; display: block; margin-bottom: 4px; }
    .pat-name { display: block; }
    .pat-desc { display: block; font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* ADMIN */
    .admin-section { margin-top: 16px; }
    .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px,1fr)); gap: 10px; margin-top: 12px; }
    .token-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
    .token-code { font-size: 18px; font-weight: 800; letter-spacing: 2px; color: var(--purple); margin-bottom: 6px; font-family: monospace; }
    .token-info { font-size: 11px; color: var(--muted); line-height: 1.7; }
    .token-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; margin-top: 5px; }
    .token-badge.active  { background: rgba(76,175,80,0.15); color: var(--green); border: 1px solid rgba(76,175,80,0.3); }
    .token-badge.pending { background: rgba(255,183,77,0.15); color: var(--orange); border: 1px solid rgba(255,183,77,0.3); }
    .token-badge.expired { background: rgba(244,67,54,0.15); color: var(--red); border: 1px solid rgba(244,67,54,0.3); }
    .btn-revoke {
      width: 100%; margin-top: 8px; padding: 6px;
      background: transparent; border: 1px solid rgba(244,67,54,0.3);
      border-radius: 6px; color: var(--red); font-size: 11px; cursor: pointer; transition: all 0.2s;
    }
    .btn-revoke:hover { background: rgba(244,67,54,0.1); }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 18px; font-size: 13px; font-weight: 600;
      opacity: 0; transform: translateY(10px); transition: all 0.3s;
      pointer-events: none; z-index: 9999; max-width: 280px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok   { border-color: var(--green); color: var(--green); }
    .toast.err  { border-color: var(--red); color: var(--red); }
    .toast.info { border-color: var(--purple); color: #b39dff; }

    .hidden { display: none !important; }
    .app { display: none; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">🤖</div>
    <div class="login-title">Handy Control</div>
    <div class="login-sub">Digite seu token de acesso</div>
    <input class="login-input" id="tokenInput" placeholder="Ex: ABC-XYZ" maxlength="20" autocomplete="off" spellcheck="false">
    <button class="login-btn" id="btnLogin">Entrar</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <nav class="navbar">
    <div class="navbar-logo">🤖 Handy Control</div>
    <div class="navbar-right">
      <div class="navbar-user" id="navUser"></div>
      <div class="timer-badge stopped hidden" id="timerBadge">00:00:00</div>
      <button class="btn-logout" id="btnLogout">Sair</button>
    </div>
  </nav>

  <div class="main">
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Aguardando conexão...</div>
      <div class="status-mode" id="statusMode">Parado</div>
    </div>

    <div class="grid">
      <!-- Velocidade -->
      <div class="card">
        <div class="card-title">⚡ Velocidade</div>
        <div class="vel-display">
          <div class="vel-number" id="velNumber">50</div>
          <div class="vel-unit">% de velocidade</div>
        </div>
        <input type="range" class="vel-slider" id="velSlider" min="1" max="100" value="50" step="1">
        <div class="vel-presets">
          <button class="btn-preset" data-v="20">20%</button>
          <button class="btn-preset" data-v="50">50%</button>
          <button class="btn-preset" data-v="75">75%</button>
          <button class="btn-preset" data-v="100">100%</button>
        </div>
      </div>

      <!-- Controles -->
      <div class="card">
        <div class="card-title">🎮 Controles</div>
        <div class="ctrl-btns">
          <button class="btn-start" id="btnStart">▶ Iniciar</button>
          <button class="btn-stop" id="btnStop">■ Parar</button>
        </div>
        <button class="btn-ansioso" id="btnAnsioso">😈 Modo Ansioso (5%)</button>
      </div>
    </div>

    <!-- Padrões -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">🎵 Padrões de movimento</div>
      <div class="patterns">
        <button class="btn-pattern active" data-pattern="steady"><span class="pat-icon">➡️</span><span class="pat-name">Constante</span><span class="pat-desc">Velocidade fixa</span></button>
        <button class="btn-pattern" data-pattern="wave"><span class="pat-icon">〰️</span><span class="pat-name">Onda</span><span class="pat-desc">Sobe e desce</span></button>
        <button class="btn-pattern" data-pattern="pulse"><span class="pat-icon">💓</span><span class="pat-name">Pulso</span><span class="pat-desc">Pulsos rápidos</span></button>
        <button class="btn-pattern" data-pattern="random"><span class="pat-icon">🎲</span><span class="pat-name">Aleatório</span><span class="pat-desc">Velocidade variada</span></button>
        <button class="btn-pattern" data-pattern="escalate"><span class="pat-icon">📈</span><span class="pat-name">Crescente</span><span class="pat-desc">Começa devagar</span></button>
        <button class="btn-pattern" data-pattern="tease"><span class="pat-icon">😏</span><span class="pat-name">Tease</span><span class="pat-desc">Para e volta</span></button>
      </div>
    </div>

    <!-- Admin -->
    <div class="admin-section hidden" id="adminSection">
      <div class="card">
        <div class="card-title">🔐 Painel Admin — Tokens ativos</div>
        <div class="admin-grid" id="adminGrid">
          <div style="color:var(--muted);font-size:13px">Carregando...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSy_placeholder",
    authDomain: "FIREBASE_AUTH_DOMAIN",
    databaseURL: "https://handy-stripchat-default-rtdb.firebaseio.com",
    projectId: "FIREBASE_PROJECT_ID",
    storageBucket: "FIREBASE_STORAGE_BUCKET",
    messagingSenderId: "FIREBASE_MESSAGING_SENDER_ID",
    appId: "FIREBASE_APP_ID"
  };
  const ADMIN_PASS = "padilha.iwersonÇ";

  const app = initializeApp(FIREBASE_CONFIG);
  const db  = getDatabase(app);

  let session = null;
  let isAdmin = false;
  let timerInterval = null;
  let timerStartedAt = null;
  let timerDuration = 0;
  let isRunning = false;
  let ansiosoOn = false;
  let currentPattern = 'steady';
  let patternInterval = null;

  const $ = id => document.getElementById(id);

  // ── LOGIN ─────────────────────────────────────────────────────────────
  $('btnLogin').onclick = () => doLogin($('tokenInput').value.trim());
  $('tokenInput').onkeydown = e => e.key === 'Enter' && $('btnLogin').click();

  async function doLogin(code) {
    const err = $('loginErr');
    err.textContent = '';
    if (!code) { err.textContent = 'Digite o token.'; return; }

    // Admin
    if (code === ADMIN_PASS || code === 'PADILHA.IWERSONÇ') {
      session = { code: 'ADMIN', isAdmin: true };
      isAdmin = true;
      enterApp();
      return;
    }

    err.textContent = 'Verificando...';
    try {
      const snap = await get(ref(db, 'tokens/' + code));
      if (!snap.exists()) { err.textContent = 'Token inválido.'; return; }
      const token = snap.val();
      if (token.revoked)  { err.textContent = 'Token revogado.'; return; }

      const now = Date.now();
      const activated = token.activatedAt || null;

      // Verifica expiração (só se já foi ativado)
      if (activated && now - activated > token.duration) {
        err.textContent = 'Token expirado.'; return;
      }

      session = { code, token };
      isAdmin = false;
      enterApp();
    } catch(e) {
      err.textContent = 'Erro ao verificar. Tente novamente.';
    }
  }

  // ── ENTRAR NO APP ─────────────────────────────────────────────────────
  function enterApp() {
    $('loginWrap').style.display = 'none';
    $('app').style.display = 'block';
    $('navUser').textContent = isAdmin ? '👑 Admin' : 'Token: ' + session.code;

    if (isAdmin) {
      $('adminSection').classList.remove('hidden');
      loadAdminTokens();
    } else {
      // Timer: começa parado, só conta quando iniciar o dispositivo
      const badge = $('timerBadge');
      badge.classList.remove('hidden');
      badge.textContent = formatTime(session.token.duration);
      badge.title = 'Timer só conta quando o dispositivo estiver rodando';
      timerDuration = session.token.duration;
    }

    listenHandyState();
  }

  // ── TIMER — só conta enquanto rodando ────────────────────────────────
  function startTimer() {
    if (timerInterval) return;
    if (!session.token.activatedAt) {
      // Primeira ativação — registra no Firebase
      const now = Date.now();
      session.token.activatedAt = now;
      update(ref(db, 'tokens/' + session.code), { activatedAt: now });
    }
    timerStartedAt = Date.now();
    timerInterval = setInterval(tickTimer, 1000);
    tickTimer();
  }

  function pauseTimer() {
    if (!timerInterval) return;
    // Desconta o tempo que passou
    const elapsed = Date.now() - timerStartedAt;
    session.token.activatedAt += elapsed;
    clearInterval(timerInterval);
    timerInterval = null;
    const badge = $('timerBadge');
    badge.classList.remove('urgent');
    badge.classList.add('stopped');
  }

  function tickTimer() {
    const now = Date.now();
    const used = session.token.activatedAt ? (now - session.token.activatedAt) : 0;
    const remaining = Math.max(0, timerDuration - used);
    const badge = $('timerBadge');
    badge.textContent = formatTime(remaining);
    badge.classList.remove('stopped');
    if (remaining < 300000) badge.classList.add('urgent');
    if (remaining <= 0) {
      clearInterval(timerInterval); timerInterval = null;
      doStop();
      showToast('err', '⏰ Tempo esgotado!');
      setTimeout(logout, 3000);
    }
  }

  function formatTime(ms) {
    const s = Math.floor(ms/1000);
    const h = Math.floor(s/3600);
    const m = Math.floor((s%3600)/60);
    const sec = s%60;
    return (h?String(h).padStart(2,'0')+':':'') + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  }

  // ── ESTADO DO HANDY ───────────────────────────────────────────────────
  function listenHandyState() {
    onValue(ref(db, 'handy/state'), snap => {
      const s = snap.val() || {};
      const dot  = $('statusDot');
      const text = $('statusText');
      const mode = $('statusMode');
      dot.className  = 'status-dot ' + (s.online ? 'online' : 'offline');
      text.textContent = s.online ? 'Handy conectado' : 'Handy offline';
      mode.textContent = s.mode || 'Parado';
    });
  }

  // ── SLIDER ────────────────────────────────────────────────────────────
  const slider = $('velSlider');
  const velNum = $('velNumber');
  slider.oninput = () => {
    const v = slider.value;
    velNum.textContent = v;
    slider.style.setProperty('--val', v + '%');
    if (isRunning) sendCmd({ type: 'velocity', value: parseInt(v) });
  };
  document.querySelectorAll('.btn-preset').forEach(btn => {
    btn.onclick = () => {
      const v = parseInt(btn.dataset.v);
      slider.value = v; velNum.textContent = v;
      slider.style.setProperty('--val', v + '%');
      document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (isRunning) sendCmd({ type: 'velocity', value: v });
    };
  });

  // ── CONTROLES ─────────────────────────────────────────────────────────
  $('btnStart').onclick = () => {
    isRunning = true; ansiosoOn = false;
    $('btnAnsioso').textContent = '😈 Modo Ansioso (5%)';
    $('btnAnsioso').classList.remove('ativo');
    stopPatternLoop();
    startPatternLoop(currentPattern, parseInt(slider.value));
    sendCmd({ type: 'start', velocity: parseInt(slider.value), pattern: currentPattern });
    startTimer();
    showToast('info', '▶ Iniciado — ' + currentPattern);
  };

  $('btnStop').onclick = doStop;

  function doStop() {
    isRunning = false; ansiosoOn = false;
    stopPatternLoop();
    $('btnAnsioso').textContent = '😈 Modo Ansioso (5%)';
    $('btnAnsioso').classList.remove('ativo');
    sendCmd({ type: 'stop' });
    pauseTimer();
    showToast('info', '■ Parado');
  }

  $('btnAnsioso').onclick = () => {
    ansiosoOn = !ansiosoOn;
    const btn = $('btnAnsioso');
    if (ansiosoOn) {
      isRunning = false; stopPatternLoop();
      btn.textContent = '🛑 Parar Modo Ansioso';
      btn.classList.add('ativo');
      sendCmd({ type: 'ansioso', active: true });
      startTimer();
      showToast('info', '😈 Modo Ansioso ativo');
    } else {
      btn.textContent = '😈 Modo Ansioso (5%)';
      btn.classList.remove('ativo');
      sendCmd({ type: 'ansioso', active: false });
      pauseTimer();
      showToast('ok', '⏹ Modo Ansioso parado');
    }
  };

  // ── PADROES ───────────────────────────────────────────────────────────
  document.querySelectorAll('.btn-pattern').forEach(btn => {
    btn.onclick = () => {
      currentPattern = btn.dataset.pattern;
      document.querySelectorAll('.btn-pattern').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (isRunning) {
        stopPatternLoop();
        startPatternLoop(currentPattern, parseInt(slider.value));
        sendCmd({ type: 'start', velocity: parseInt(slider.value), pattern: currentPattern });
      }
    };
  });

  function startPatternLoop(pat, baseVel) {
    stopPatternLoop();
    if (pat === 'steady') return;
    let tick = 0, high = true, current = 5;
    patternInterval = setInterval(() => {
      let v = baseVel;
      if (pat==='wave')     v = Math.round(baseVel*0.5 + baseVel*0.5*Math.sin(tick+=0.2));
      else if (pat==='pulse')    { v = high?baseVel:Math.max(5,Math.round(baseVel*0.3)); high=!high; }
      else if (pat==='random')   v = Math.max(5, Math.round(Math.random()*baseVel));
      else if (pat==='escalate') { current=Math.min(baseVel,current+3); v=current; }
      else if (pat==='tease')    { tick++; if(tick%5===0)high=!high; v=high?baseVel:1; }
      v = Math.max(1, Math.min(100, v));
      sendCmd({ type: 'velocity', value: v });
    }, 800);
  }

  function stopPatternLoop() {
    if (patternInterval) { clearInterval(patternInterval); patternInterval = null; }
  }

  async function sendCmd(cmd) {
    await set(ref(db, 'handy/command'), { ...cmd, from: session.code, ts: Date.now() });
  }

  // ── ADMIN ─────────────────────────────────────────────────────────────
  async function loadAdminTokens() {
    const grid = $('adminGrid');
    const snap = await get(ref(db, 'tokens'));
    grid.innerHTML = '';
    if (!snap.exists()) { grid.innerHTML = '<div style="color:var(--muted);font-size:13px">Nenhum token gerado ainda.</div>'; return; }
    const now = Date.now();
    snap.forEach(child => {
      const t = child.val();
      let cls, label;
      if (t.revoked) { cls='expired'; label='Revogado'; }
      else if (!t.activatedAt) { cls='pending'; label='Aguardando ativação'; }
      else if (now - t.activatedAt > t.duration) { cls='expired'; label='Expirado'; }
      else { cls='active'; label='Ativo'; }

      const used = t.activatedAt ? Math.max(0, now - t.activatedAt) : 0;
      const remaining = Math.max(0, t.duration - used);

      const div = document.createElement('div');
      div.className = 'token-card';
      div.innerHTML = `
        <div class="token-code">${t.code}</div>
        <div class="token-info">
          Duração total: ${(t.duration/3600000).toFixed(1)}h<br>
          Restante: ${formatTime(remaining)}<br>
          <span class="token-badge ${cls}">${label}</span>
        </div>
        <button class="btn-revoke" data-code="${t.code}">Revogar</button>
      `;
      div.querySelector('.btn-revoke').onclick = async () => {
        await update(ref(db, 'tokens/'+t.code), { revoked: true });
        showToast('ok', 'Token ' + t.code + ' revogado');
        loadAdminTokens();
      };
      grid.appendChild(div);
    });
  }

  // ── LOGOUT ────────────────────────────────────────────────────────────
  function logout() {
    clearInterval(timerInterval); timerInterval = null;
    stopPatternLoop();
    isRunning = false; ansiosoOn = false;
    session = null; isAdmin = false;
    $('loginWrap').style.display = 'flex';
    $('app').style.display = 'none';
    $('tokenInput').value = ''; $('loginErr').textContent = '';
    $('timerBadge').classList.add('hidden');
    $('adminSection').classList.add('hidden');
  }
  $('btnLogout').onclick = logout;

  // ── TOAST ─────────────────────────────────────────────────────────────
  let toastT;
  function showToast(type, msg) {
    const t = $('toast');
    t.textContent = msg; t.className = 'toast ' + type + ' show';
    clearTimeout(toastT);
    toastT = setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
