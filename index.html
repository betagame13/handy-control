<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handy Control</title>
  <style>
    :root {
      --bg:#0a0a0f;--surface:#13131f;--surface2:#1a1a2e;--border:#252540;
      --purple:#7c4dff;--purple2:#e040fb;--green:#4caf50;--orange:#ffb74d;
      --red:#f44336;--text:#e8e8f0;--muted:#666;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:"Segoe UI",system-ui,sans-serif;min-height:100vh;}

    /* LOGIN */
    #loginWrap{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:radial-gradient(ellipse at 50% 0%,rgba(124,77,255,.15) 0%,transparent 70%);
    }
    .login-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:20px;padding:40px 36px;width:360px;
      box-shadow:0 24px 80px rgba(0,0,0,.5);text-align:center;
    }
    .login-logo{font-size:48px;margin-bottom:12px;}
    .login-title{
      font-size:22px;font-weight:800;margin-bottom:4px;
      background:linear-gradient(135deg,#e040fb,#7c4dff);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
    #tokenInput{
      width:100%;padding:14px 16px;margin-bottom:12px;
      background:var(--surface2);border:1px solid var(--border);
      border-radius:10px;color:var(--text);font-size:16px;
      outline:none;transition:border-color .2s;
      font-family:monospace;letter-spacing:3px;text-align:center;
      -webkit-user-select:text;user-select:text;cursor:text;
    }
    #tokenInput::placeholder{font-size:13px;letter-spacing:1px;color:var(--muted);opacity:1;}
    #tokenInput:focus{border-color:var(--purple);}
    .login-btn{
      width:100%;padding:14px;
      background:linear-gradient(135deg,var(--purple),var(--purple2));
      border:none;border-radius:10px;color:#fff;
      font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;
    }
    .login-btn:hover{opacity:.88;}
    .login-err{font-size:12px;color:var(--red);min-height:18px;margin-top:8px;}

    /* NAVBAR */
    .navbar{
      background:var(--surface);border-bottom:1px solid var(--border);
      padding:0 24px;height:58px;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:100;
    }
    .navbar-logo{font-size:15px;font-weight:800;background:linear-gradient(135deg,#e040fb,#7c4dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .navbar-right{display:flex;align-items:center;gap:12px;}
    .navbar-user{font-size:12px;color:var(--muted);}
    .timer-badge{
      font-size:13px;font-weight:700;color:var(--orange);
      background:rgba(255,183,77,.1);border:1px solid rgba(255,183,77,.3);
      padding:5px 12px;border-radius:20px;font-variant-numeric:tabular-nums;
    }
    .timer-badge.urgent{color:var(--red);background:rgba(244,67,54,.1);border-color:rgba(244,67,54,.3);animation:blink 1s infinite;}
    .timer-badge.stopped{color:var(--muted);background:transparent;border-color:var(--border);}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
    .btn-logout{
      padding:6px 14px;background:transparent;border:1px solid var(--border);
      border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s;
    }
    .btn-logout:hover{border-color:var(--red);color:var(--red);}

    .main{padding:24px;max-width:860px;margin:0 auto;}

    /* STATUS */
    .status-bar{
      display:flex;align-items:center;gap:10px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:12px;padding:14px 18px;margin-bottom:20px;
    }
    .status-dot{width:10px;height:10px;border-radius:50%;background:var(--muted);transition:all .3s;}
    .status-dot.online{background:var(--green);box-shadow:0 0 8px var(--green);}
    .status-dot.offline{background:var(--red);}
    .status-text{font-size:13px;font-weight:600;flex:1;}
    .status-mode{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(124,77,255,.15);color:var(--purple);border:1px solid rgba(124,77,255,.3);}

    /* GRAFICO */
    .chart-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:14px;padding:18px;margin-bottom:16px;
    }
    .chart-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
    .chart-pattern-badge{
      font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;
      background:rgba(124,77,255,.15);color:var(--purple);border:1px solid rgba(124,77,255,.3);
      text-transform:none;letter-spacing:0;transition:all .3s;
    }
    .chart-wrap{position:relative;height:150px;width:100%;}
    #velChart{display:block;width:100%;height:130px;border-radius:8px;filter:blur(0.3px);}

    /* CARD */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;}
    .card-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;}

    /* SLIDER */
    .vel-display{text-align:center;margin-bottom:12px;}
    .vel-number{font-size:42px;font-weight:900;line-height:1;background:linear-gradient(135deg,#7c4dff,#e040fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .vel-unit{font-size:13px;color:var(--muted);margin-top:2px;}
    .vel-slider{
      width:100%;height:8px;border-radius:4px;
      -webkit-appearance:none;appearance:none;
      background:linear-gradient(to right,var(--purple) 0%,var(--purple2) var(--val,0%),rgba(37,37,64,0.8) var(--val,0%));
      outline:none;cursor:pointer;margin-bottom:16px;
      touch-action:none;
    }
    .vel-slider.locked{
      opacity:0.35; cursor:not-allowed; pointer-events:none;
    }
    .vel-slider.locked::-webkit-slider-thumb{ cursor:not-allowed; }
    .pattern-hint{
      font-size:11px; color:var(--muted); text-align:center;
      margin-top:-4px; margin-bottom:10px; min-height:16px;
      transition: color 0.2s;
    }
    .pattern-hint.locked{ color:var(--purple); }
    .vel-slider::-webkit-slider-thumb{
      -webkit-appearance:none;width:28px;height:28px;border-radius:50%;
      background:#fff;box-shadow:0 2px 12px rgba(124,77,255,.8);cursor:pointer;
      transition:transform .1s;
    }
    .vel-slider::-webkit-slider-thumb:hover{transform:scale(1.15);}
    .vel-slider:active::-webkit-slider-thumb{transform:scale(1.2);}
    .vel-presets{display:flex;gap:6px;margin-bottom:14px;}
    .btn-preset{
      flex:1;padding:7px 0;background:var(--surface2);
      border:1px solid var(--border);border-radius:8px;
      color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;
    }
    .btn-preset:hover,.btn-preset.active{background:var(--purple);border-color:var(--purple);color:#fff;}
    .btn-preset.zero{border-color:rgba(244,67,54,.4);color:var(--red);}
    .btn-preset.zero.active{background:var(--red);border-color:var(--red);color:#fff;}
    .vel-presets.locked .btn-preset:not(.zero){ opacity:0.3; pointer-events:none; cursor:not-allowed; }

    /* PADROES */
    .patterns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .btn-pattern{
      padding:10px 8px;background:var(--surface2);
      border:1px solid var(--border);border-radius:10px;
      color:var(--text);font-size:12px;font-weight:600;
      cursor:pointer;transition:all .2s;text-align:center;
    }
    .btn-pattern:hover{border-color:var(--purple);background:rgba(124,77,255,.1);}
    .btn-pattern.active{border-color:var(--purple);background:rgba(124,77,255,.15);color:var(--purple);}
    .pat-icon{font-size:18px;display:block;margin-bottom:3px;}
    .pat-name{display:block;}
    .pat-desc{display:block;font-size:10px;color:var(--muted);margin-top:1px;}

    /* ADMIN */
    .admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-top:12px;}
    .token-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;}
    .token-code{font-size:17px;font-weight:800;letter-spacing:2px;color:var(--purple);margin-bottom:6px;font-family:monospace;}
    .token-info{font-size:11px;color:var(--muted);line-height:1.7;}
    .token-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-top:5px;}
    .token-badge.active{background:rgba(76,175,80,.15);color:var(--green);border:1px solid rgba(76,175,80,.3);}
    .token-badge.pending{background:rgba(255,183,77,.15);color:var(--orange);border:1px solid rgba(255,183,77,.3);}
    .token-badge.expired{background:rgba(244,67,54,.15);color:var(--red);border:1px solid rgba(244,67,54,.3);}
    .btn-revoke{width:100%;margin-top:8px;padding:6px;background:transparent;border:1px solid rgba(244,67,54,.3);border-radius:6px;color:var(--red);font-size:11px;cursor:pointer;transition:all .2s;}
    .btn-revoke:hover{background:rgba(244,67,54,.1);}

    /* TOAST */
    .toast{
      position:fixed;bottom:24px;right:24px;
      background:var(--surface2);border:1px solid var(--border);
      border-radius:12px;padding:12px 18px;font-size:13px;font-weight:600;
      opacity:0;transform:translateY(10px);transition:all .3s;
      pointer-events:none;z-index:9999;max-width:280px;
    }
    .toast.show{opacity:1;transform:translateY(0);}
    .toast.ok{border-color:var(--green);color:var(--green);}
    .toast.err{border-color:var(--red);color:var(--red);}
    .toast.info{border-color:var(--purple);color:#b39dff;}
    .hidden{display:none!important;}
    .version-tag{
      position:fixed;bottom:10px;right:12px;
      font-size:10px;color:rgba(255,255,255,0.15);
      font-family:monospace;letter-spacing:0.5px;
      pointer-events:none;z-index:9998;
      transition:color .3s;
    }
    .version-tag:hover{color:rgba(255,255,255,0.45);}
    .app{display:none;}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-card">
    <div class="login-logo">&#129302;</div>
    <div class="login-title">Handy Control</div>
    <div class="login-sub">Digite seu token de acesso</div>
    <input id="tokenInput" type="text" placeholder="Ex: ABC-XYZ" autocomplete="off" spellcheck="false" maxlength="30">
    <button class="login-btn" id="btnLogin">Entrar</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <nav class="navbar">
    <div class="navbar-logo">&#129302; Handy Control</div>
    <div class="navbar-right">
      <div class="navbar-user" id="navUser"></div>
      <div class="timer-badge stopped hidden" id="timerBadge">00:00:00</div>
      <button class="btn-logout" id="btnLogout">Sair</button>
    </div>
  </nav>

  <div class="main">
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Aguardando conexão...</div>
      <div class="status-mode" id="statusMode">Parado</div>
    </div>

    <div class="chart-card">
      <div class="chart-title">
        <span>Velocidade em tempo real</span>
        <span class="chart-pattern-badge" id="chartPatternLabel">Parado</span>
      </div>
      <div class="chart-wrap">
        <canvas id="velChart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Controle de velocidade</div>
      <div class="vel-display">
        <div class="vel-number" id="velNumber">0</div>
        <div class="vel-unit">% de velocidade</div>
      </div>
      <input type="range" class="vel-slider" id="velSlider" min="0" max="100" value="0" step="1">
      <div class="pattern-hint" id="patternHint">Arraste para controlar a velocidade</div>
      <div class="vel-presets" id="velPresets">
        <button class="btn-preset zero active" data-v="0">0%</button>
        <button class="btn-preset" data-v="25">25%</button>
        <button class="btn-preset" data-v="50">50%</button>
        <button class="btn-preset" data-v="75">75%</button>
        <button class="btn-preset" data-v="100">100%</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Padrões de movimento</div>
      <div class="patterns">
        <button class="btn-pattern active" data-pattern="steady"><span class="pat-icon">🖐</span><span class="pat-name">Manual</span><span class="pat-desc">Você controla</span></button>
        <button class="btn-pattern" data-pattern="wave"><span class="pat-icon">&#12316;&#65039;</span><span class="pat-name">Onda</span><span class="pat-desc">Sobe e desce</span></button>
        <button class="btn-pattern" data-pattern="pulse"><span class="pat-icon">&#128147;</span><span class="pat-name">Pulso</span><span class="pat-desc">Pulsos rápidos</span></button>
        <button class="btn-pattern" data-pattern="random"><span class="pat-icon">&#127922;</span><span class="pat-name">Aleatório</span><span class="pat-desc">Velocidade variada</span></button>
        <button class="btn-pattern" data-pattern="escalate"><span class="pat-icon">&#128200;</span><span class="pat-name">Crescente</span><span class="pat-desc">Começa devagar</span></button>
        <button class="btn-pattern" data-pattern="tease"><span class="pat-icon">&#128527;</span><span class="pat-name">Tease</span><span class="pat-desc">Para e volta</span></button>
      </div>
    </div>

    <!-- Admin -->
    <div class="hidden" id="adminSection">
      <div class="card">
        <div class="card-title">&#128272; Tokens ativos</div>
        <div class="admin-grid" id="adminGrid"><div style="color:var(--muted);font-size:13px">Carregando...</div></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="version-tag">v1.2.8</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FIREBASE_CONFIG = {
  apiKey:"AIzaSyDuCce8-CEY2LdTO0S_ypwjqpXdcJihGHo",
  authDomain:"handy-stripchat.firebaseapp.com",
  databaseURL:"https://handy-stripchat-default-rtdb.firebaseio.com",
  projectId:"handy-stripchat",
  storageBucket:"handy-stripchat.firebasestorage.app",
  messagingSenderId:"164073155377",
  appId:"1:164073155377:web:1ac29507bcdafae6855e10"
};
const ADMIN_HASH = "a9bba2af568a7eaf20f2aefd5f992012a5ec14f285f81fbd36ef79d5f01cce96";

const fbApp = initializeApp(FIREBASE_CONFIG);
const db    = getDatabase(fbApp);

const $ = id => document.getElementById(id);

let session=null,isAdmin=false,timerInterval=null,timerDuration=0;
let isRunning=false,ansiosoOn=false,currentPattern="steady",patternInterval=null,currentBaseVel=50;

// GRAFICO — renderizacao fluida 60fps com interpolacao bezier
const canvas = $("velChart");
const ctx    = canvas ? canvas.getContext("2d") : null;
const chartPat = $("chartPatternLabel");

// Buffer circular de amostras em tempo real
const SAMPLE_RATE = 50;   // ms entre amostras
const WINDOW_MS   = 6000; // 6 segundos visiveis
let   samples     = [];   // [{t, v}]
let   currentVel  = 0;
let   chartRaf    = null;
let   sampleInterval = null;

function resizeChart(){
  if(!canvas || !ctx) return;
  const wrap = canvas.parentElement;
  const dpr  = Math.max(window.devicePixelRatio || 1, 2); // min 2x para antialiasing
  const W    = wrap.offsetWidth  || 800;
  const H    = wrap.offsetHeight || 130;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Antialiasing maximo
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
}
window.addEventListener("resize", resizeChart);

function pushVel(v){
  const now = performance.now();
  samples.push({t: now, v: v});
  const cutoff = now - WINDOW_MS - 500;
  while(samples.length > 0 && samples[0].t < cutoff) samples.shift();
}

function startChartLoop(){
  if(chartRaf) return;
  (function loop(){
    drawChart();
    chartRaf = requestAnimationFrame(loop);
  })();
}

function stopChartLoop(){
  if(chartRaf){ cancelAnimationFrame(chartRaf); chartRaf = null; }
}

function startSampling(){
  if(sampleInterval) return;
  sampleInterval = setInterval(()=> pushVel(currentVel), 16);
}

// Cores por padrao
const PATTERN_COLORS = {
  steady:   {line:"rgba(124,77,255,1)",   fill:"rgba(124,77,255,0.22)"},
  wave:     {line:"rgba(64,196,255,1)",    fill:"rgba(64,196,255,0.18)"},
  pulse:    {line:"rgba(244,67,54,1)",     fill:"rgba(244,67,54,0.18)"},
  random:   {line:"rgba(255,183,77,1)",    fill:"rgba(255,183,77,0.18)"},
  escalate: {line:"rgba(129,199,132,1)",   fill:"rgba(129,199,132,0.18)"},
  tease:    {line:"rgba(224,64,251,1)",    fill:"rgba(224,64,251,0.18)"},
};

function drawChart(){
  if(!ctx || !canvas.width) return;
  const dpr = window.devicePixelRatio||1;
  const W   = canvas.width/dpr;
  const H   = canvas.height/dpr;
  if(W<10||H<10) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Grid
  [25,50,75].forEach(pct=>{
    const y=velY(pct,H);
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y);
    ctx.strokeStyle="rgba(255,255,255,0.05)"; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle="rgba(255,255,255,0.2)"; ctx.font="9px system-ui";
    ctx.fillText(pct+"%",6,y-4);
  });

  const clr   = PATTERN_COLORS[currentPattern]||PATTERN_COLORS.steady;
  const nowMs = performance.now();

  // Todos os padroes usam samples — mesmo sistema, mesma linha
  if(samples.length<2) return;

  const tStart = nowMs - WINDOW_MS;
  let raw = samples
    .map(s=>({x:((s.t-tStart)/WINDOW_MS)*W, y:velY(s.v,H)}))
    .filter(p=>p.x>=-20);
  if(raw.length<2) return;

  // Interpola pontos extras entre amostras — elimina mini degraus
  const pts = [];
  for(let i=0; i<raw.length-1; i++){
    const a=raw[i], b=raw[i+1];
    const dx=b.x-a.x;
    // So interpola se os pontos estiverem distantes (>2px)
    if(dx>2){
      const steps=Math.min(Math.ceil(dx/2), 8);
      for(let s=0; s<steps; s++){
        const f=s/steps;
        pts.push({x:a.x+dx*f, y:a.y+(b.y-a.y)*f});
      }
    } else {
      pts.push(a);
    }
  }
  pts.push(raw[raw.length-1]);
  if(pts.length<2) return;

  // Onda usa lineTo puro (pontos densos a 60fps — nao precisa de curvas)
  // Outros padroes usam Catmull-Rom para suavizar transicoes
  const useLineTo = currentPattern === "wave";

  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for(let i=0;i<pts.length-1;i++){
    const p1=pts[i];
    const p2=pts[i+1];
    if(useLineTo){
      ctx.lineTo(p2.x, p2.y);
    } else {
      const p0=pts[Math.max(i-1,0)];
      const p3=pts[Math.min(i+2,pts.length-1)];
      const jc=Math.abs(p2.y-p1.y)/H;
      const jp=Math.abs(p1.y-p0.y)/H;
      const jn=Math.abs(p3.y-p2.y)/H;
      if(jc>0.25||jp>0.25||jn>0.25){
        ctx.lineTo(p2.x,p2.y);
      } else {
        const t=0.3;
        ctx.bezierCurveTo(
          p1.x+(p2.x-p0.x)*t/3, p1.y+(p2.y-p0.y)*t/3,
          p2.x-(p3.x-p1.x)*t/3, p2.y-(p3.y-p1.y)*t/3,
          p2.x, p2.y
        );
      }
    }
  }
  ctx.strokeStyle=clr.line;
  ctx.lineWidth=1.5;
  ctx.lineJoin="round";
  ctx.lineCap="round";
  ctx.shadowColor=clr.line;
  ctx.shadowBlur=6;
  ctx.stroke();
  ctx.shadowBlur=0;

  // Fill
  const last=pts[pts.length-1];
  ctx.lineTo(last.x,H); ctx.lineTo(pts[0].x,H); ctx.closePath();
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,clr.fill);
  grad.addColorStop(0.6,clr.fill.replace(/[\d.]+\)$/,"0.06)"));
  grad.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=grad; ctx.fill();

  // Ponto pulsante
  if(currentVel>0){
    const pulse=0.65+0.35*Math.sin(nowMs*0.007);
    ctx.shadowColor=clr.line; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(last.x,last.y,4,0,Math.PI*2);
    ctx.fillStyle=clr.line; ctx.fill();
    ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(last.x,last.y,8*pulse,0,Math.PI*2);
    ctx.strokeStyle=clr.line.replace(/[\d.]+\)$/,"0.25)");
    ctx.lineWidth=1.5; ctx.stroke();
  }
}

function velY(v, H){ return H - (v/100) * H * 0.88 - H * 0.06; }


// amostras via setVel e patternLoop

// LOGIN
const tokenInput = $("tokenInput");
$("btnLogin").addEventListener("click", ()=>doLogin());
tokenInput.addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });

async function hashStr(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function doLogin(){
  const raw = tokenInput.value.trim();
  const err = $("loginErr");
  err.textContent="";
  if(!raw){ err.textContent="Digite o token."; return; }

  // Verifica se e admin comparando hash — senha nunca fica exposta
  const hash = await hashStr(raw);
  if(hash === ADMIN_HASH){
    session={code:"ADMIN",isAdmin:true};
    isAdmin=true;
    enterApp();
    return;
  }

  // Token — busca no Firebase
  const code=raw.toUpperCase();
  err.textContent="Verificando...";

  get(ref(db,"tokens/"+code)).then(snap=>{
    if(!snap.exists()){ err.textContent="Token inválido."; return; }
    const token=snap.val();
    if(token.revoked){ err.textContent="Token revogado."; return; }
    const now=Date.now();
    if(token.activatedAt && now-token.activatedAt>token.duration){
      err.textContent="Token expirado."; return;
    }
    session={code,token}; isAdmin=false; enterApp();
  }).catch(e=>{
    console.error("Firebase erro:", e);
    err.textContent="Erro de conexão. Verifique as credenciais Firebase.";
  });
}

function enterApp(){
  $("loginWrap").style.display="none";
  $("app").style.display="block";
  $("navUser").textContent=isAdmin?"Admin":"Token: "+session.code;
  if(!isAdmin){
    const b=$("timerBadge"); b.classList.remove("hidden");
    timerDuration=session.token.duration;
    b.textContent=formatTime(timerDuration);
    // Inicia timer imediatamente ao entrar
    startTimer();
  } else {
    $("adminSection").classList.remove("hidden");
    loadAdminTokens();
  }
  listenHandyState();
  // Tenta até o canvas ter tamanho real (max 10 tentativas)
  let _tries = 0;
  function initChart(){
    const wrap = document.querySelector('.chart-wrap');
    const W = wrap ? wrap.offsetWidth : 0;
    if(W > 10 || _tries++ > 10){
      resizeChart();
      startChartLoop();
      startSampling();
    } else {
      setTimeout(initChart, 100);
    }
  }
  setTimeout(initChart, 100);
}

// TIMER
function startTimer(){
  if(timerInterval) return;
  if(!session.token.activatedAt){
    session.token.activatedAt=Date.now();
    update(ref(db,"tokens/"+session.code),{activatedAt:session.token.activatedAt});
  }
  timerInterval=setInterval(tickTimer,1000); tickTimer();
}
function pauseTimer(){
  if(!timerInterval) return;
  clearInterval(timerInterval); timerInterval=null;
  $("timerBadge").classList.add("stopped");
}
function tickTimer(){
  const used=session.token.activatedAt?(Date.now()-session.token.activatedAt):0;
  const rem=Math.max(0,timerDuration-used);
  const b=$("timerBadge");
  b.textContent=formatTime(rem); b.classList.remove("stopped");
  if(rem<300000) b.classList.add("urgent");
  if(rem<=0){ clearInterval(timerInterval); timerInterval=null; doStop(); setTimeout(logout,3000); }
}
function formatTime(ms){
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return (h?String(h).padStart(2,"0")+":":"")+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
}

// ESTADO
function listenHandyState(){
  // Timeout: se Firebase não responder em 4s, mostra offline
  const fbTimeout = setTimeout(()=>{
    if($("statusText").textContent === "Aguardando conexão..."){
      $("statusDot").className="status-dot offline";
      $("statusText").textContent="Firebase não configurado";
      $("statusMode").textContent="Sem conexão";
    }
  }, 4000);

  onValue(ref(db,"handy/state"), snap=>{
    clearTimeout(fbTimeout);
    const s=snap.val()||{};
    $("statusDot").className="status-dot "+(s.online?"online":"offline");
    $("statusText").textContent=s.online?"Handy conectado":"Handy offline";
    $("statusMode").textContent=s.mode||"Parado";
  }, err=>{
    clearTimeout(fbTimeout);
    $("statusDot").className="status-dot offline";
    $("statusText").textContent="Erro Firebase — verifique as credenciais";
    $("statusMode").textContent="Sem conexão";
  });
}

// SLIDER
const slider=$("velSlider"), velNum=$("velNumber");

function setVel(v){ currentBaseVel = v;
  v=Math.max(0,Math.min(100,v));
  slider.value=v; velNum.textContent=v;
  slider.style.setProperty("--val",v+"%");
  currentVel=v;
  document.querySelectorAll(".btn-preset").forEach(b=>b.classList.toggle("active",parseInt(b.dataset.v)===v));
  if(v===0){
    if(isRunning||ansiosoOn) doStop();
  } else {
    if(isPatternLocked(currentPattern)){
      // Padrao bloqueado — slider não faz nada
      return;
    }
    // Padroes livres: atualiza velocidade base sem mudar padrao
    stopPatternLoop();
    startPatternLoop(currentPattern, v);
    if(!isRunning&&!ansiosoOn){
      isRunning=true;
      sendCmd({type:"start",velocity:v,pattern:currentPattern});
      sendCmd({type:"velocity",value:v});
    } else {
      sendCmd({type:"velocity",value:v});
    }
  }
}

slider.addEventListener("input",()=>setVel(parseInt(slider.value)));
document.querySelectorAll(".btn-preset").forEach(btn=>{
  btn.addEventListener("click",()=>setVel(parseInt(btn.dataset.v)));
});

function doStop(){
  isRunning=false; ansiosoOn=false; stopPatternLoop();
  sendCmd({type:"stop"}); pauseTimer();
  currentVel=0;
  document.querySelectorAll(".btn-preset").forEach(b=>b.classList.remove("active"));
  document.querySelector(".btn-preset.zero").classList.add("active");
  velNum.textContent=0; slider.value=0; slider.style.setProperty("--val","0%");
  updatePatternBadge("Parado");
  updateSliderLock("steady");
  const ph=$("patternHint"); if(ph){ ph.textContent="Direto: velocidade exata do slider, sem variacao"; ph.classList.remove("locked"); }
}

// PADROES
document.querySelectorAll(".btn-pattern").forEach(btn=>{
  btn.addEventListener("click",()=>{
    currentPattern=btn.dataset.pattern;
    document.querySelectorAll(".btn-pattern").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const name=btn.querySelector(".pat-name").textContent;
    updatePatternBadge(name);
    updateSliderLock(currentPattern);
    if(isRunning || ansiosoOn){
      // Para steady usa valor do slider — para outros usa currentVel
      const vel = currentPattern==="steady" ? parseInt(slider.value)||0 : currentVel;
      stopPatternLoop();
      startPatternLoop(currentPattern, vel);
      if(currentPattern !== "steady"){
        sendCmd({type:"start", velocity:Math.round(vel), pattern:currentPattern});
      }
    }
  });
});

// Padroes que ignoram o slider e usam 0-100% proprios
const LOCKED_PATTERNS = ["tease","random"]; // onda usa slider como amplitude maxima

function isPatternLocked(pat){ return LOCKED_PATTERNS.indexOf(pat) !== -1; }

function updateSliderLock(pat){
  const s = $("velSlider");
  const p = $("velPresets");
  const h = $("patternHint");
  if(!s) return;

  if(pat==="tease"){
    s.classList.add("locked"); if(p) p.classList.add("locked");
    if(h){ h.textContent="Tease: alterna 0% ↔ 100% automaticamente"; h.classList.add("locked"); }
  } else if(pat==="random"){
    s.classList.add("locked"); if(p) p.classList.add("locked");
    if(h){ h.textContent="Aleatório: sorteia 0% a 100% livremente"; h.classList.add("locked"); }
  } else if(pat==="steady"){
    s.classList.remove("locked"); if(p) p.classList.remove("locked");
    if(h){ h.textContent="Manual: você controla direto pelo slider"; h.classList.remove("locked"); }
  } else if(pat==="wave"){
    s.classList.remove("locked"); if(p) p.classList.remove("locked");
    if(h){ h.textContent="Onda: oscila de 0% até o valor do slider"; h.classList.remove("locked"); }
  } else if(pat==="pulse"){
    s.classList.remove("locked"); if(p) p.classList.remove("locked");
    if(h){ h.textContent="Pulso: batida rápida ao pico e pausa"; h.classList.remove("locked"); }
  } else if(pat==="escalate"){
    s.classList.remove("locked"); if(p) p.classList.remove("locked");
    if(h){ h.textContent="Crescente: sobe gradualmente até a velocidade escolhida"; h.classList.remove("locked"); }
  }
}

function startPatternLoop(pat, baseVel){
  stopPatternLoop();
  updateSliderLock(pat);
  if(pat==="wave"){
    // Onda: RAF para valores continuos baseados em tempo real
    let waveLastCmd = 0;
    let waveRafId   = null;
    function waveLoop(){
      const now  = performance.now();
      const t    = now / 1000;
      const norm = (Math.sin(t * Math.PI * 2.0) + 1) / 2;
      const vf   = norm * baseVel;
      currentVel = vf;
      pushVel(vf);
      if(now - waveLastCmd >= 50){
        waveLastCmd = now;
        if(vf < 2) sendCmd({type:"stop"});
        else        sendCmd({type:"velocity", value: Math.round(vf)});
      }
      waveRafId = requestAnimationFrame(waveLoop);
    }
    waveRafId = requestAnimationFrame(waveLoop);
    // Guarda referencia para poder parar
    patternInterval = { _isWaveRaf: true, _id: null };
    Object.defineProperty(patternInterval, '_id', {
      get(){ return waveRafId; }, set(v){ waveRafId=v; }
    });
    return;
  }
  if(pat==="steady"){
    // Manual: envia velocidade e inicia se necessario
    currentVel = baseVel;
    if(baseVel > 0){
      if(!isRunning){ isRunning=true; sendCmd({type:"start", velocity:baseVel, pattern:"steady"}); }
      else { sendCmd({type:"velocity", value:baseVel}); }
    } else {
      sendCmd({type:"stop"});
    }
    return;
  }

  let tick=0, high=true, cur=0, escDir=1;
  const interval = pat==="tease" ? 1200 : pat==="wave" ? 30 : pat==="pulse" ? 120 : pat==="escalate" ? 200 : 800;

  patternInterval = setInterval(()=>{
    let v = baseVel;

    if(pat==="pulse"){
      // Pulso: sobe rapido ao pico, desce rapido, pausa curta
      tick++;
      const phase = tick % 8; // ciclo de 8 steps
      if(phase < 2)       v = Math.round(baseVel * (phase / 2));       // sobe
      else if(phase < 3)  v = baseVel;                                   // pico
      else if(phase < 5)  v = Math.round(baseVel * ((5 - phase) / 2)); // desce
      else                v = 0;                                          // pausa
      currentVel = v;
      if(v <= 0){ sendCmd({type:"stop"}); return; }
      sendCmd({type:"velocity", value:v});
      return;
    }
    else if(pat==="random"){
      // Aleatório: 0-100% livre, ignora slider
      v = Math.round(Math.random() * 100);
      currentVel = v;
      if(v < 5){ sendCmd({type:"stop"}); currentVel=0; return; }
      sendCmd({type:"velocity", value:v});
      return;
    }
    else if(pat==="escalate"){
      cur += 15 * escDir;
      if(cur >= baseVel){ cur = baseVel; escDir = -1; }
      else if(cur <= 0) { cur = 0;       escDir =  1; }
      v = Math.round(cur);
      if(v <= 0){ currentVel=0; sendCmd({type:"stop"}); return; }
    }
    else if(pat==="tease"){
      high = !high;
      if(high){ currentVel=100; sendCmd({type:"velocity", value:100}); }
      else    { currentVel=0;   sendCmd({type:"stop"}); }
      return;
    }

    currentVel = v;
    sendCmd({type:"velocity", value:v});
  }, interval);
}
function stopPatternLoop(){
  if(patternInterval){
    if(patternInterval._isWaveRaf){
      cancelAnimationFrame(patternInterval._id);
    } else {
      clearInterval(patternInterval);
    }
    patternInterval=null;
  }
  // Garante que samples tem pelo menos um ponto atual ao trocar de padrao
  if(samples.length === 0 || performance.now() - samples[samples.length-1].t > 200){
    pushVel(currentVel);
  }
}

function updatePatternBadge(name){
  const el=document.getElementById("chartPatternLabel");
  if(!el) return;
  el.textContent=name;
  const clr=PATTERN_COLORS[currentPattern]||PATTERN_COLORS.steady;
  // Extrai cor base da linha para usar no badge
  const rgb=clr.line.replace("rgba(","").split(",");
  el.style.background="rgba("+rgb[0]+","+rgb[1]+","+rgb[2]+",0.12)";
  el.style.color=clr.line;
  el.style.borderColor="rgba("+rgb[0]+","+rgb[1]+","+rgb[2]+",0.4)";
}

async function sendCmd(cmd){ await set(ref(db,"handy/command"),{...cmd,from:session.code,ts:Date.now()}); }

// ADMIN
async function loadAdminTokens(){
  const grid=$("adminGrid");
  const snap=await get(ref(db,"tokens"));
  grid.innerHTML="";
  if(!snap.exists()){ grid.innerHTML="<div style=\"color:var(--muted);font-size:13px\">Nenhum token ainda.</div>"; return; }
  const now=Date.now();
  snap.forEach(child=>{
    const t=child.val();
    let cls,label;
    if(t.revoked){cls="expired";label="Revogado";}
    else if(!t.activatedAt){cls="pending";label="Aguardando";}
    else if(now-t.activatedAt>t.duration){cls="expired";label="Expirado";}
    else{cls="active";label="Ativo";}
    const used=t.activatedAt?Math.max(0,now-t.activatedAt):0;
    const rem=Math.max(0,t.duration-used);
    const div=document.createElement("div");
    div.className="token-card";
    div.innerHTML="<div class=\"token-code\">"+t.code+"</div><div class=\"token-info\">Duracao: "+(t.duration/60000).toFixed(0)+"min<br>Restante: "+formatTime(rem)+"<br><span class=\"token-badge "+cls+"\">"+label+"</span></div><button class=\"btn-revoke\" data-code=\""+t.code+"\">Revogar</button>";
    div.querySelector(".btn-revoke").onclick=async()=>{
      await update(ref(db,"tokens/"+t.code),{revoked:true});
      showToast("ok","Token "+t.code+" revogado"); loadAdminTokens();
    };
    grid.appendChild(div);
  });
}

// LOGOUT
function logout(){
  clearInterval(timerInterval); timerInterval=null;
  stopPatternLoop(); stopChartLoop();
  if(sampleInterval){ clearInterval(sampleInterval); sampleInterval=null; }
  isRunning=false; ansiosoOn=false; session=null; isAdmin=false;
  currentVel=0; 
  $("loginWrap").style.display="flex";
  $("app").style.display="none";
  tokenInput.value=""; $("loginErr").textContent="";
  $("timerBadge").classList.add("hidden");
  $("adminSection").classList.add("hidden");
}
$("btnLogout").addEventListener("click",logout);

// TOAST
let toastT;
function showToast(type,msg){
  const t=$("toast"); t.textContent=msg; t.className="toast "+type+" show";
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),3000);
}
