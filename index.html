<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handy Control</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131f;
      --surface2: #1a1a2e;
      --border: #252540;
      --purple: #7c4dff;
      --purple2: #e040fb;
      --pink: #f48fb1;
      --green: #4caf50;
      --orange: #ffb74d;
      --red: #f44336;
      --blue: #64b5f6;
      --text: #e8e8f0;
      --muted: #666;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: "Segoe UI", system-ui, sans-serif; min-height: 100vh; }

    /* LOGIN */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, rgba(124,77,255,0.15) 0%, transparent 70%);
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px 36px; width: 360px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      text-align: center;
    }
    .login-logo { font-size: 48px; margin-bottom: 12px; }
    .login-title {
      font-size: 22px; font-weight: 800; margin-bottom: 4px;
      background: linear-gradient(135deg, #e040fb, #7c4dff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .login-input {
      width: 100%; padding: 14px 16px; margin-bottom: 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 15px;
      outline: none; transition: border-color 0.2s; letter-spacing: 2px; text-align: center;
    }
    .login-input:focus { border-color: var(--purple); }
    .login-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--purple), var(--purple2));
      border: none; border-radius: 10px; color: #fff;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s; margin-bottom: 8px;
    }
    .login-btn:hover { opacity: 0.88; }
    .login-err { font-size: 12px; color: var(--red); min-height: 18px; margin-top: 4px; }
    .login-admin-link { font-size: 12px; color: var(--muted); margin-top: 16px; cursor: pointer; }
    .login-admin-link:hover { color: var(--purple); }

    /* APP */
    .app { display: none; }
    .navbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .navbar-logo {
      font-size: 15px; font-weight: 800;
      background: linear-gradient(135deg, #e040fb, #7c4dff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .navbar-right { display: flex; align-items: center; gap: 12px; }
    .navbar-user { font-size: 12px; color: var(--muted); }
    .navbar-timer {
      font-size: 12px; font-weight: 700; color: var(--orange);
      background: rgba(255,183,77,0.1); border: 1px solid rgba(255,183,77,0.3);
      padding: 4px 10px; border-radius: 20px;
    }
    .navbar-timer.urgent { color: var(--red); background: rgba(244,67,54,0.1); border-color: rgba(244,67,54,0.3); animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .btn-logout {
      padding: 6px 14px; background: transparent;
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    .main { padding: 24px; max-width: 900px; margin: 0 auto; }

    /* STATUS BAR */
    .status-bar {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px; margin-bottom: 20px;
    }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
    .status-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.offline { background: var(--red); }
    .status-text { font-size: 13px; font-weight: 600; flex: 1; }
    .status-mode {
      font-size: 11px; padding: 3px 10px; border-radius: 20px;
      background: rgba(124,77,255,0.15); color: var(--purple); border: 1px solid rgba(124,77,255,0.3);
    }

    /* GRID */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media(max-width:600px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px;
    }
    .card-title {
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px;
    }

    /* VELOCIDADE */
    .vel-display {
      text-align: center; margin-bottom: 16px;
    }
    .vel-number {
      font-size: 56px; font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, #7c4dff, #e040fb);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .vel-unit { font-size: 16px; color: var(--muted); margin-top: 2px; }
    .vel-slider {
      width: 100%; height: 6px; border-radius: 3px;
      -webkit-appearance: none; appearance: none;
      background: linear-gradient(to right, var(--purple) 0%, var(--purple2) var(--val, 50%), var(--border) var(--val, 50%));
      outline: none; cursor: pointer; margin-bottom: 12px;
    }
    .vel-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
      background: #fff; box-shadow: 0 2px 8px rgba(124,77,255,0.6); cursor: pointer;
    }
    .vel-presets { display: flex; gap: 6px; }
    .btn-preset {
      flex: 1; padding: 7px 0; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-preset:hover, .btn-preset.active { background: var(--purple); border-color: var(--purple); color: #fff; }

    /* CONTROLES PRINCIPAIS */
    .ctrl-btns { display: flex; gap: 10px; margin-bottom: 14px; }
    .btn-start {
      flex: 1; padding: 14px;
      background: linear-gradient(135deg, #2e7d32, #43a047);
      border: none; border-radius: 10px; color: #fff;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-start:hover { opacity: 0.88; transform: scale(1.02); }
    .btn-stop {
      flex: 1; padding: 14px;
      background: linear-gradient(135deg, #b71c1c, #f44336);
      border: none; border-radius: 10px; color: #fff;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-stop:hover { opacity: 0.88; }

    /* PADROES */
    .patterns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn-pattern {
      padding: 12px 8px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .btn-pattern:hover { border-color: var(--purple); background: rgba(124,77,255,0.1); }
    .btn-pattern.active { border-color: var(--purple); background: rgba(124,77,255,0.15); color: var(--purple); }
    .btn-pattern .pat-icon { font-size: 20px; display: block; margin-bottom: 4px; }
    .btn-pattern .pat-name { display: block; }
    .btn-pattern .pat-desc { display: block; font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* ANSIOSO */
    .btn-ansioso {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #ff6b35, #ff1744);
      border: none; border-radius: 10px; color: #fff;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-ansioso:hover { opacity: 0.88; }
    .btn-ansioso.ativo { animation: pulse-red 1.5s infinite; }
    @keyframes pulse-red {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,23,68,0.5); }
      50%      { box-shadow: 0 0 0 10px rgba(255,23,68,0); }
    }

    /* ADMIN PANEL */
    .admin-section { margin-top: 24px; }
    .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 12px; }
    .token-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px;
    }
    .token-code { font-size: 18px; font-weight: 800; letter-spacing: 2px; color: var(--purple); margin-bottom: 6px; }
    .token-info { font-size: 11px; color: var(--muted); line-height: 1.6; }
    .token-status { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; margin-top: 6px; }
    .token-status.active { background: rgba(76,175,80,0.15); color: var(--green); border: 1px solid rgba(76,175,80,0.3); }
    .token-status.pending { background: rgba(255,183,77,0.15); color: var(--orange); border: 1px solid rgba(255,183,77,0.3); }
    .token-status.expired { background: rgba(244,67,54,0.15); color: var(--red); border: 1px solid rgba(244,67,54,0.3); }
    .btn-revoke {
      width: 100%; margin-top: 8px; padding: 6px;
      background: transparent; border: 1px solid rgba(244,67,54,0.3);
      border-radius: 6px; color: var(--red); font-size: 11px; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-revoke:hover { background: rgba(244,67,54,0.1); }

    .gen-token-form { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .gen-select {
      padding: 9px 12px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px; outline: none; cursor: pointer;
    }
    .btn-gen {
      padding: 9px 18px;
      background: linear-gradient(135deg, var(--purple), var(--purple2));
      border: none; border-radius: 8px; color: #fff;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .btn-gen:hover { opacity: 0.88; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px;
      font-size: 13px; font-weight: 600;
      opacity: 0; transform: translateY(10px);
      transition: all 0.3s; pointer-events: none; z-index: 9999;
      max-width: 280px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok  { border-color: var(--green); color: var(--green); }
    .toast.err { border-color: var(--red); color: var(--red); }
    .toast.info { border-color: var(--purple); color: #b39dff; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">🤖</div>
    <div class="login-title">Handy Control</div>
    <div class="login-sub">Digite seu token de acesso</div>
    <input class="login-input" id="tokenInput" placeholder="XXX-XXX" maxlength="20" autocomplete="off">
    <button class="login-btn" id="btnLogin">Entrar</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-admin-link" id="adminLink">🔐 Acesso admin</div>
  </div>
</div>

<!-- ADMIN LOGIN MODAL -->
<div id="adminModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;align-items:center;justify-content:center;">
  <div class="login-card" style="width:320px">
    <div class="login-title" style="margin-bottom:20px">Admin</div>
    <input class="login-input" id="adminPass" type="password" placeholder="Senha admin" style="letter-spacing:normal">
    <button class="login-btn" id="btnAdminLogin">Entrar como Admin</button>
    <div class="login-err" id="adminErr"></div>
    <div class="login-admin-link" id="closeAdminModal" style="margin-top:12px">Cancelar</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <nav class="navbar">
    <div class="navbar-logo">🤖 Handy Control</div>
    <div class="navbar-right">
      <div class="navbar-user" id="navUser"></div>
      <div class="navbar-timer hidden" id="navTimer"></div>
      <button class="btn-logout" id="btnLogout">Sair</button>
    </div>
  </nav>

  <div class="main">
    <!-- Status -->
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Aguardando conexão...</div>
      <div class="status-mode" id="statusMode">--</div>
    </div>

    <div class="grid">
      <!-- Velocidade -->
      <div class="card">
        <div class="card-title">⚡ Velocidade</div>
        <div class="vel-display">
          <div class="vel-number" id="velNumber">50</div>
          <div class="vel-unit">% de velocidade</div>
        </div>
        <input type="range" class="vel-slider" id="velSlider" min="1" max="100" value="50">
        <div class="vel-presets">
          <button class="btn-preset" data-v="20">20%</button>
          <button class="btn-preset" data-v="50">50%</button>
          <button class="btn-preset" data-v="75">75%</button>
          <button class="btn-preset" data-v="100">100%</button>
        </div>
      </div>

      <!-- Controles -->
      <div class="card">
        <div class="card-title">🎮 Controles</div>
        <div class="ctrl-btns">
          <button class="btn-start" id="btnStart">▶ Iniciar</button>
          <button class="btn-stop" id="btnStop">■ Parar</button>
        </div>
        <button class="btn-ansioso" id="btnAnsioso">😈 Modo Ansioso (5%)</button>
      </div>
    </div>

    <!-- Padrões -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">🎵 Padrões de movimento</div>
      <div class="patterns">
        <button class="btn-pattern" data-pattern="steady">
          <span class="pat-icon">➡️</span>
          <span class="pat-name">Constante</span>
          <span class="pat-desc">Velocidade fixa contínua</span>
        </button>
        <button class="btn-pattern" data-pattern="wave">
          <span class="pat-icon">〰️</span>
          <span class="pat-name">Onda</span>
          <span class="pat-desc">Sobe e desce suavemente</span>
        </button>
        <button class="btn-pattern" data-pattern="pulse">
          <span class="pat-icon">💓</span>
          <span class="pat-name">Pulso</span>
          <span class="pat-desc">Aceleração em pulsos</span>
        </button>
        <button class="btn-pattern" data-pattern="random">
          <span class="pat-icon">🎲</span>
          <span class="pat-name">Aleatório</span>
          <span class="pat-desc">Velocidade variada</span>
        </button>
        <button class="btn-pattern" data-pattern="escalate">
          <span class="pat-icon">📈</span>
          <span class="pat-name">Crescente</span>
          <span class="pat-desc">Começa devagar, acelera</span>
        </button>
        <button class="btn-pattern" data-pattern="tease">
          <span class="pat-icon">😏</span>
          <span class="pat-name">Tease</span>
          <span class="pat-desc">Para e volta sem aviso</span>
        </button>
      </div>
    </div>

    <!-- Admin panel -->
    <div class="admin-section hidden" id="adminSection">
      <div class="card">
        <div class="card-title">🔐 Painel Admin — Tokens</div>
        <div class="gen-token-form">
          <select class="gen-select" id="tokenDuration">
            <option value="3600000">1 hora</option>
            <option value="10800000">3 horas</option>
            <option value="21600000">6 horas</option>
            <option value="43200000">12 horas</option>
            <option value="86400000">24 horas</option>
            <option value="604800000">7 dias</option>
          </select>
          <button class="btn-gen" id="btnGenToken">+ Gerar Token</button>
        </div>
        <div class="admin-grid" id="adminGrid"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ── FIREBASE CONFIG — substitua pelos seus valores ───────────────────
  const firebaseConfig = {
    apiKey: "FIREBASE_API_KEY",
    authDomain: "FIREBASE_AUTH_DOMAIN",
    databaseURL: "FIREBASE_DATABASE_URL",
    projectId: "FIREBASE_PROJECT_ID",
    storageBucket: "FIREBASE_STORAGE_BUCKET",
    messagingSenderId: "FIREBASE_MESSAGING_SENDER_ID",
    appId: "FIREBASE_APP_ID"
  };
  // ─────────────────────────────────────────────────────────────────────

  const ADMIN_PASS = "padilha.iwersonÇ"; // Ç
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  let currentUser = null;
  let isAdmin     = false;
  let timerInterval = null;
  let patternInterval = null;
  let currentPattern = 'steady';
  let isRunning = false;
  let ansiosoOn = false;

  // ── ELEMENTOS ─────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const loginWrap   = $('loginWrap');
  const app_el      = $('app');
  const tokenInput  = $('tokenInput');
  const loginErr    = $('loginErr');
  const adminModal  = $('adminModal');

  // ── LOGIN TOKEN ───────────────────────────────────────────────────────
  $('btnLogin').onclick = () => loginWithToken(tokenInput.value.trim().toUpperCase());
  tokenInput.onkeydown  = e => e.key === 'Enter' && $('btnLogin').click();

  async function loginWithToken(code) {
    if (!code) { loginErr.textContent = 'Digite o token.'; return; }
    loginErr.textContent = 'Verificando...';
    const snap = await get(ref(db, 'tokens/' + code));
    if (!snap.exists()) { loginErr.textContent = 'Token inválido.'; return; }
    const token = snap.val();
    if (token.revoked) { loginErr.textContent = 'Token revogado.'; return; }

    // Ativa o timer na primeira vez que logar
    if (!token.activatedAt) {
      await update(ref(db, 'tokens/' + code), { activatedAt: Date.now() });
    }
    // Verifica expiração
    const activated = token.activatedAt || Date.now();
    if (Date.now() - activated > token.duration) {
      loginErr.textContent = 'Token expirado.'; return;
    }

    currentUser = { code, token: { ...token, activatedAt: activated } };
    isAdmin = false;
    enterApp();
  }

  // ── LOGIN ADMIN ───────────────────────────────────────────────────────
  $('adminLink').onclick = () => { adminModal.style.display = 'flex'; }
  $('closeAdminModal').onclick = () => { adminModal.style.display = 'none'; }
  $('btnAdminLogin').onclick = () => {
    const pass = $('adminPass').value;
    if (pass === ADMIN_PASS) {
      adminModal.style.display = 'none';
      currentUser = { code: 'ADMIN', token: { duration: Infinity } };
      isAdmin = true;
      enterApp();
    } else {
      $('adminErr').textContent = 'Senha incorreta.';
    }
  };

  // ── ENTRAR NO APP ─────────────────────────────────────────────────────
  function enterApp() {
    loginWrap.style.display = 'none';
    app_el.style.display = 'block';
    $('navUser').textContent = isAdmin ? '👑 Admin' : ('Token: ' + currentUser.code);

    if (!isAdmin) {
      startCountdown();
    } else {
      $('adminSection').classList.remove('hidden');
      loadAdminTokens();
    }

    listenHandyState();
  }

  // ── TIMER ─────────────────────────────────────────────────────────────
  function startCountdown() {
    const timer = $('navTimer');
    timer.classList.remove('hidden');
    timerInterval = setInterval(() => {
      const elapsed  = Date.now() - currentUser.token.activatedAt;
      const remaining = currentUser.token.duration - elapsed;
      if (remaining <= 0) { clearInterval(timerInterval); timer.textContent = 'EXPIRADO'; logout(); return; }
      const h = Math.floor(remaining/3600000);
      const m = Math.floor((remaining%3600000)/60000);
      const s = Math.floor((remaining%60000)/1000);
      timer.textContent = (h?h+'h ':'')+m+'m '+s+'s';
      if (remaining < 300000) timer.classList.add('urgent');
    }, 1000);
  }

  // ── OUVE ESTADO DO HANDY NO FIREBASE ──────────────────────────────────
  function listenHandyState() {
    onValue(ref(db, 'handy/state'), snap => {
      const state = snap.val() || {};
      const dot  = $('statusDot');
      const text = $('statusText');
      const mode = $('statusMode');
      if (state.online) {
        dot.className  = 'status-dot online';
        text.textContent = 'Handy conectado';
      } else {
        dot.className  = 'status-dot offline';
        text.textContent = 'Handy offline (extensão não detectada)';
      }
      mode.textContent = state.mode || 'Parado';
    });
  }

  // ── SLIDER DE VELOCIDADE ──────────────────────────────────────────────
  const slider = $('velSlider');
  const velNum = $('velNumber');
  slider.oninput = () => {
    const v = slider.value;
    velNum.textContent = v;
    slider.style.setProperty('--val', v + '%');
    if (isRunning) sendCommand({ type: 'velocity', value: parseInt(v) });
  };

  document.querySelectorAll('.btn-preset').forEach(btn => {
    btn.onclick = () => {
      const v = parseInt(btn.dataset.v);
      slider.value = v;
      velNum.textContent = v;
      slider.style.setProperty('--val', v + '%');
      document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (isRunning) sendCommand({ type: 'velocity', value: v });
    };
  });

  // ── CONTROLES ─────────────────────────────────────────────────────────
  $('btnStart').onclick = () => {
    isRunning = true; ansiosoOn = false;
    stopPattern();
    startPattern(currentPattern);
    sendCommand({ type: 'start', velocity: parseInt(slider.value), pattern: currentPattern });
    showToast('info', '▶ Iniciado — padrão: ' + currentPattern);
  };

  $('btnStop').onclick = () => {
    isRunning = false; ansiosoOn = false;
    stopPattern();
    sendCommand({ type: 'stop' });
    showToast('info', '■ Parado');
  };

  $('btnAnsioso').onclick = () => {
    ansiosoOn = !ansiosoOn;
    const btn = $('btnAnsioso');
    if (ansiosoOn) {
      isRunning = false; stopPattern();
      btn.textContent = '🛑 Parar Modo Ansioso';
      btn.classList.add('ativo');
      sendCommand({ type: 'ansioso', active: true });
      showToast('info', '😈 Modo Ansioso ativo');
    } else {
      btn.textContent = '😈 Modo Ansioso (5%)';
      btn.classList.remove('ativo');
      sendCommand({ type: 'ansioso', active: false });
      showToast('ok', '⏹ Modo Ansioso parado');
    }
  };

  // ── PADRÕES ───────────────────────────────────────────────────────────
  document.querySelectorAll('.btn-pattern').forEach(btn => {
    btn.onclick = () => {
      currentPattern = btn.dataset.pattern;
      document.querySelectorAll('.btn-pattern').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (isRunning) {
        stopPattern();
        startPattern(currentPattern);
        sendCommand({ type: 'start', velocity: parseInt(slider.value), pattern: currentPattern });
      }
    };
  });

  function startPattern(pat) {
    stopPattern();
    const vel = () => parseInt(slider.value);
    const key = currentUser.code;

    if (pat === 'wave') {
      let tick = 0;
      patternInterval = setInterval(() => {
        const v = Math.round(vel() * 0.5 + vel() * 0.5 * Math.sin(tick));
        tick += 0.2;
        sendCommand({ type: 'velocity', value: Math.max(1, Math.min(100, v)) });
      }, 800);
    } else if (pat === 'pulse') {
      let high = true;
      patternInterval = setInterval(() => {
        sendCommand({ type: 'velocity', value: high ? vel() : Math.max(5, Math.round(vel()*0.3)) });
        high = !high;
      }, 600);
    } else if (pat === 'random') {
      patternInterval = setInterval(() => {
        const v = Math.max(5, Math.round(Math.random() * vel()));
        sendCommand({ type: 'velocity', value: v });
      }, 1200);
    } else if (pat === 'escalate') {
      let current = 5;
      patternInterval = setInterval(() => {
        current = Math.min(vel(), current + 3);
        sendCommand({ type: 'velocity', value: current });
      }, 500);
    } else if (pat === 'tease') {
      let on = true; let count = 0;
      patternInterval = setInterval(() => {
        count++;
        if (count % 5 === 0) on = !on;
        sendCommand({ type: 'velocity', value: on ? vel() : 1 });
      }, 700);
    }
    // steady = sem interval, velocidade fixa
  }

  function stopPattern() {
    if (patternInterval) { clearInterval(patternInterval); patternInterval = null; }
  }

  // ── ENVIA COMANDO PARA O FIREBASE ─────────────────────────────────────
  async function sendCommand(cmd) {
    await set(ref(db, 'handy/command'), {
      ...cmd,
      from: currentUser.code,
      ts: Date.now()
    });
  }

  // ── ADMIN: GERAR TOKEN ────────────────────────────────────────────────
  $('btnGenToken') && ($('btnGenToken').onclick = async () => {
    const dur = parseInt($('tokenDuration').value);
    const code = genCode();
    await set(ref(db, 'tokens/' + code), {
      code, duration: dur, createdAt: Date.now(),
      activatedAt: null, revoked: false
    });
    showToast('ok', 'Token gerado: ' + code);
    loadAdminTokens();
  });

  function genCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    const seg = () => Array.from({length:3}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
    return seg() + '-' + seg();
  }

  async function loadAdminTokens() {
    const grid = $('adminGrid');
    if (!grid) return;
    const snap = await get(ref(db, 'tokens'));
    grid.innerHTML = '';
    if (!snap.exists()) { grid.innerHTML = '<div style="color:var(--muted);font-size:13px">Nenhum token ainda.</div>'; return; }
    snap.forEach(child => {
      const t = child.val();
      const code = t.code;
      const now = Date.now();
      let statusClass, statusLabel;
      if (t.revoked) { statusClass='expired'; statusLabel='Revogado'; }
      else if (!t.activatedAt) { statusClass='pending'; statusLabel='Aguardando'; }
      else if (now - t.activatedAt > t.duration) { statusClass='expired'; statusLabel='Expirado'; }
      else {
        statusClass='active'; statusLabel='Ativo';
      }
      const remaining = t.activatedAt ? Math.max(0, t.duration-(now-t.activatedAt)) : t.duration;
      const hrs = (remaining/3600000).toFixed(1);
      const div = document.createElement('div');
      div.className = 'token-card';
      div.innerHTML = \`
        <div class="token-code">\${code}</div>
        <div class="token-info">
          Duração: \${(t.duration/3600000).toFixed(1)}h<br>
          Restante: \${hrs}h<br>
          Status: <span class="token-status \${statusClass}">\${statusLabel}</span>
        </div>
        <button class="btn-revoke" data-code="\${code}">Revogar</button>
      \`;
      div.querySelector('.btn-revoke').onclick = async () => {
        await update(ref(db, 'tokens/'+code), { revoked: true });
        showToast('ok', 'Token ' + code + ' revogado');
        loadAdminTokens();
      };
      grid.appendChild(div);
    });
  }

  // ── LOGOUT ────────────────────────────────────────────────────────────
  function logout() {
    clearInterval(timerInterval);
    stopPattern();
    sendCommand({ type: 'stop' });
    currentUser = null; isAdmin = false; isRunning = false; ansiosoOn = false;
    loginWrap.style.display = 'flex';
    app_el.style.display = 'none';
    tokenInput.value = ''; loginErr.textContent = '';
  }
  $('btnLogout').onclick = logout;

  // ── TOAST ─────────────────────────────────────────────────────────────
  let toastT;
  function showToast(type, msg) {
    const t = $('toast');
    t.textContent = msg; t.className = 'toast ' + type + ' show';
    clearTimeout(toastT);
    toastT = setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
